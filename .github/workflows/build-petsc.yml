name: Build PETSc

on:
  workflow_dispatch:
    inputs:
      petsc_ver:
        description: "PETSc version"
        required: true
        type: string
        default: "3.19.2"

      petsc_arch:
        description: "PETSc arch"
        required: true
        type: choice
        options:
          - "linux-gnu"
          - "linux-gnu-opt"
        default: "linux-gnu"

      ubuntu_codename:
        description: "Ubuntu LTS"
        required: true
        type: choice
        default: "resolute"
        options:
          - "jammy"
          - "noble"
          - "resolute"

defaults:
  run:
    shell: bash --login -e -o pipefail {0} # login for environment modules
    working-directory: ./scripts/custom

jobs:
  setup:
    name: Build PETSc ${{ inputs.petsc_ver }}/${{ inputs.petsc_arch }}

    runs-on: ubuntu-latest

    container:
      image: "ubuntu:${{ inputs.ubuntu_codename }}"
      env:
        RUNNER_OFF: 1
      options: --user 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set env
        run: |
          echo "MODULES_DIR=$HOME/modules" >> $GITHUB_ENV
          echo "PETSC_VER=${{ inputs.petsc_ver }}" >> $GITHUB_ENV
          echo "PETSC_ARCH=${{ inputs.petsc_arch }}" >> $GITHUB_ENV

      - name: Setup OS
        run: |
          ./setup_custom.sh

      - name: List environment modules
        run: |
          module avail

      - name: Run build script
        run: |
          ./install_petsc.sh \
            --version=${{ env.PETSC_VER }} \
            --arch=${{ env.PETSC_ARCH }} \
            --modules-dir=${{ env.MODULES_DIR }}

      - name: Test
        run: |
          module use ${{ env.MODULES_DIR }}/modulefiles
          module avail
          module load petsc/${{ env.PETSC_VER }}/${{ env.PETSC_ARCH }}
          module test petsc/${{ env.PETSC_VER }}/${{ env.PETSC_ARCH }}

  record:
    name: Record build
    needs: setup
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    uses: ./.github/workflows/update-monitored-versions.yml
    with:
      dependency: petsc
      version: ${{ inputs.petsc_ver }}
