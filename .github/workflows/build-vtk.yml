name: Build VTK

on:
  workflow_dispatch:
    inputs:
      vtk_ver:
        description: "VTK version"
        required: true
        type: string
        default: "9.1.0"

      ubuntu_codename:
        description: "Ubuntu LTS"
        required: true
        type: choice
        default: "resolute"
        options:
          - "jammy"
          - "noble"
          - "resolute"

defaults:
  run:
    shell: bash --login -e -o pipefail {0} # login for environment modules
    working-directory: ./scripts/custom

jobs:
  setup:
    name: Build VTK ${{ inputs.vtk_ver }}

    runs-on: ubuntu-latest

    container:
      image: "ubuntu:${{ inputs.ubuntu_codename }}"
      env:
        RUNNER_OFF: 1
      options: --user 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set env
        run: |
          echo "MODULES_DIR=$HOME/modules" >> $GITHUB_ENV
          echo "VTK_VER=${{ inputs.vtk_ver }}" >> $GITHUB_ENV

      - name: Setup OS
        run: |
          ./setup_custom.sh && \
          apt-get install -y libboost-dev mpi-default-bin mpi-default-dev

      - name: List environment modules
        run: |
          module avail

      - name: Run build script
        run: |
          ./install_vtk.sh \
            --version=${{ env.VTK_VER }} \
            --modules-dir=${{ env.MODULES_DIR }}

      - name: Test
        run: |
          module use ${{ env.MODULES_DIR }}/modulefiles
          module avail
          module load vtk/${{ env.VTK_VER }}
          module test vtk/${{ env.VTK_VER }}

  record:
    name: Record build
    needs: setup
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-monitored-versions.yml
    with:
      dependency: vtk
      version: ${{ inputs.vtk_ver }}
