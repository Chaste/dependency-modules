name: Update monitored versions

on:
  workflow_call:
    inputs:
      dependency:
        description: "Dependency name"
        required: true
        type: string
      version:
        description: "Built version"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check if update is needed
        id: check
        run: |
          . infra/shared.sh
          if check_dependency "${{ inputs.dependency }}" "${{ inputs.version }}"; then
            echo "needed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "needed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Update manifest
        if: steps.check.outputs.needed == 'true'
        run: |
          bash infra/update_monitored_version.sh \
            --dependency=${{ inputs.dependency }} \
            --version=${{ inputs.version }}

      - name: Commit manifest update
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "infra/versions/${{ inputs.dependency }}.json"
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "chore: record successful ${{ inputs.dependency }} ${{ inputs.version }} build"
          git push
